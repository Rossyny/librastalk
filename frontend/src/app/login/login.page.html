<ion-content class="ion-padding bg-slate-900 flex items-center justify-center min-h-screen">
  <div class="max-w-md mx-auto py-12 px-4 sm:px-6 lg:px-8 flex flex-col justify-center min-h-screen">
    
    <!-- Botão flutuante para voltar -->
    <div class="mb-6">
      <button (click)="voltarAoPortal()" class="text-sm text-indigo-400 hover:text-indigo-300 transition-colors flex items-center gap-1">
        ← Voltar ao Portal
      </button>
    </div>

    <!-- Card de Login -->
    <ion-card class="rounded-3xl border border-slate-800 bg-slate-950/60 shadow-2xl overflow-hidden backdrop-blur-md">
      <ion-card-header class="text-center pt-8 pb-4">
        <div class="text-4xl mb-3">🔑</div>
        <ion-card-title class="text-white font-extrabold text-2xl tracking-tight">Login Corporativo</ion-card-title>
        <p class="text-xs text-indigo-400 font-semibold uppercase tracking-wider mt-1">Libras Talk Credential Manager</p>
      </ion-card-header>

      <ion-card-content class="px-6 pb-8 pt-4">
        <div class="space-y-5">
          
          <!-- Input E-mail -->
          <ion-item fill="outline" class="rounded-xl custom-dark-item">
            <ion-label position="floating" class="text-slate-400">E-mail Corporativo</ion-label>
            <ion-input type="email" [(ngModel)]="credenciais.email" placeholder="Ex: gerente@estabelecimento.com" class="text-white"></ion-input>
          </ion-item>

          <!-- Input Senha -->
          <ion-item fill="outline" class="rounded-xl custom-dark-item">
            <ion-label position="floating" class="text-slate-400">Senha de Acesso</ion-label>
            <ion-input type="password" [(ngModel)]="credenciais.senha" placeholder="Digite sua senha" class="text-white"></ion-input>
          </ion-item>

          <!-- Feedback de Erros -->
          <div *ngIf="mensagemErro" class="p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs font-semibold text-center animate-shake">
            ❌ {{ mensagemErro }}
          </div>

          <ion-progress-bar *ngIf="carregando" type="indeterminate" color="indigo"></ion-progress-bar>

          <!-- Botão de Login -->
          <ion-button expand="block" (click)="realizarLogin()" class="font-bold mt-4" color="indigo">
            Entrar no Sistema
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <!-- Rodapé de Apoio -->
    <div class="text-center mt-8 text-xs text-slate-600">
      Seu estabelecimento comercial deve possuir uma licença de uso ativa.
    </div>

  </div>
</ion-content>
