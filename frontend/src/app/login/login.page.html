<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">
    
    <!-- Botão de Voltar Minimalista -->
    <button (click)="voltarAoPortal()" class="back-btn">
      <ion-icon name="arrow-back-outline"></ion-icon>
      <ion-text>Voltar ao Portal</ion-text>
    </button>
    
    <div class="header-section">
      <div class="logo-placeholder">
        <ion-icon name="flash" class="logo-icon"></ion-icon>
      </div>
      <h2>Bem-vindo de volta!</h2>
      <p>Faça login para continuar acessando sua conta.</p>
    </div>

    <!-- Formulário do Login integrado ao angular -->
    <form class="login-form" (ngSubmit)="realizarLogin()">
      <div class="input-group">
        <ion-item lines="none" class="custom-input">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input 
            type="email" 
            placeholder="E-mail Corporativo" 
            [(ngModel)]="credenciais.email" 
            name="email"
            required>
          </ion-input>
        </ion-item>

        <ion-item lines="none" class="custom-input">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input 
            type="password" 
            placeholder="Senha" 
            [(ngModel)]="credenciais.senha" 
            name="senha"
            required>
          </ion-input>
        </ion-item>
      </div>

      <!-- Feedback Visual de Erro -->
      <div *ngIf="mensagemErro" class="error-banner">
        <span>❌ {{ mensagemErro }}</span>
      </div>

      <!-- Indicador de Processamento da API -->
      <ion-progress-bar *ngIf="carregando" type="indeterminate"></ion-progress-bar>

      <!-- <div class="forgot-password">
        <a href="#">Esqueceu a senha?</a>
      </div> -->

      <ion-button 
        type="submit" 
        expand="block" 
        class="main-button" 
        mode="ios" 
        [disabled]="carregando">
        Entrar
      </ion-button>
    </form>

      </button>

      </button>
    </div>

    <div class="footer-section">
      <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
    </div> -->

  </div>
</ion-content>
